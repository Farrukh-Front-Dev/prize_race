version: "3.9"

services:

  # ── API ────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # These override .env values inside docker network
      DATABASE_URL: postgresql://prizerace:prizerace@postgres:5432/prizerace
      TARANTOOL_HOST: tarantool
      TARANTOOL_PORT: "3301"
    depends_on:
      postgres:
        condition: service_healthy
      tarantool:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: prizerace
      POSTGRES_PASSWORD: prizerace
      POSTGRES_DB: prizerace
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prizerace"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Tarantool ─────────────────────────────────────────────────────────────
  tarantool:
    image: tarantool/tarantool:2.11
    ports:
      - "3301:3301"
    volumes:
      - tarantool_data:/var/lib/tarantool
      # Mount the init Lua script into the container
      - ./tarantool/init.lua:/opt/tarantool/init.lua:ro
    command: tarantool /opt/tarantool/init.lua
    healthcheck:
      test: ["CMD", "tarantool", "-e", "require('console').connect('127.0.0.1:3301')"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  tarantool_data:
